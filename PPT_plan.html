<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Creation - ZestoraX</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }
        
         :root {
            --bg: #050509;
            --card: #0f0f1a;
            --text: #fff;
            --accent: #00f7ff;
        }
        
        body.light {
            --bg: #f5f5f5;
            --card: #fff;
            --text: #111;
            --accent: #007bff;
        }
        
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        /* HEADER */
        
        header {
            position: fixed;
            width: 100%;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo img {
            width: 40px;
            border-radius: 8px;
        }
        
        .logo h2 {
            color: var(--accent);
        }
        
        nav {
            display: flex;
            gap: 20px;
        }
        
        nav a {
            color: var(--text);
            text-decoration: none;
        }
        
        .controls {
            display: flex;
            gap: 10px;
        }
        
        .toggle {
            padding: 6px 10px;
            background: var(--accent);
            color: black;
            border-radius: 50px;
            cursor: pointer;
        }
        /* SECTION */
        
        .section {
            max-width: 900px;
            margin: auto;
            padding: 120px 20px 60px;
        }
        
        h2 {
            text-align: center;
            color: var(--accent);
        }
        /* FORM GLASS STYLE */
        
        form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* TRANSPARENT INPUTS */
        
        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: var(--text);
            outline: none;
            transition: 0.3s;
        }
        /* Placeholder */
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        /* Glow effect */
        
        input:focus,
        select:focus {
            border: 1px solid var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
        /* FIX DROPDOWN OPTIONS */
        
        select option {
            color: black;
            background: white;
        }
        /* Button */
        
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        /* FOOTER */
        
        footer {
            background: var(--card);
            padding: 30px;
            text-align: center;
        }
        
        .social a {
            margin: 0 10px;
            color: var(--accent);
            font-size: 20px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <img src="https://res.cloudinary.com/dxar2t0kt/image/upload/v1774517436/WhatsApp_Image_2026-03-17_at_09.10.31-removebg-preview_ax11cq.png">
            <h2>ZestoraX</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#cards">Services</a>
            <a href="index.html#form">Contact</a>
        </nav>

        <div class="controls">
            <div class="toggle" onclick="toggleTheme()">🌙</div>
        </div>
    </header>

    <!-- CONTENT -->
    <section class="section">

        <h2>PPT Creation Plan</h2>

        <p style="text-align:center;">
            We create professional, high-quality presentations for:
            <br>• College Projects
            <br>• Business Pitch Decks
            <br>• Startups & Competitions
            <br>• Reports & Seminars
        </p>

        <form onsubmit="sendWhatsApp(event)">

            <input type="text" id="name" placeholder="Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="tel" id="phone" placeholder="Contact Number" required>
            <input type="number" id="slides" placeholder="Number of Slides" required>

            <select id="type" required>
<option value="">Select Presentation Type</option>
<option>Project</option>
<option>Business</option>
<option>Startup Pitch</option>
<option>Seminar</option>
</select>

            <button type="submit">Submit & Contact</button>

        </form>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>📞 +91-7768836063</p>
        <p>📧 team.zestorax@gmail.com</p>

        <div class="social">
            <a href="https://www.instagram.com/zestorax" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="https://github.com/devParth404/ZestoraX"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.facebook.com/profile.php?id=61580699111340"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.youtube.com/@team_zestora"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </footer>

    <script>
        function toggleTheme() {
            document.body.classList.toggle("light");
        }

        function sendWhatsApp(e) {
            e.preventDefault();

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let phone = document.getElementById("phone").value;
            let slides = document.getElementById("slides").value;
            let type = document.getElementById("type").value;

            let message = `Name: ${name}%0AEmail: ${email}%0AContact: ${phone}%0ASlides: ${slides}%0AType: ${type}%0A%0AAbove is my correct detail. Give cost for it.`;

            window.open(`https://wa.me/917768836063?text=${message}`, "_blank");
        }
    </script>

</body>

</html>
